<div class="space-y-3 relative" style="position: relative;">

  <!-- champ recherche -->
  <input
    type="text"
    [(ngModel)]="searchText"
    (input)="searchAddress()"
    placeholder="Rechercher une adresse..."
    class="w-full border rounded-lg px-3 py-2 shadow-sm focus:ring focus:ring-blue-200"
  />

  <!-- suggestions - avec z-index élevé -->
  <div
    *ngIf="suggestions.length"
    class="absolute z-[9999] w-full bg-white border rounded-lg shadow-lg max-h-48 overflow-auto"
    style="top: 45px; left: 0; right: 0;"
  >
    <div
      *ngFor="let s of suggestions"
      (click)="selectAddress(s)"
      class="px-3 py-2 hover:bg-gray-100 cursor-pointer text-sm"
    >
      {{ s.display_name }}
    </div>
  </div>

  <!-- carte - avec z-index plus bas -->
  <div
    id="map"
    class="rounded-xl border shadow relative z-[1]"
    style="height:420px; width:100%;"
  ></div>

</div>

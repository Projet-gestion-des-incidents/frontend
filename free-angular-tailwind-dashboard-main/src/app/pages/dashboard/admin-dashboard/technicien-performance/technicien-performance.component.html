  <!-- Tableau techniciens -->
<div class="space-y-6 animate-fadeIn">
  
  <div *ngIf="loading" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-[#C5C6FF] border-t-[#8788FF]"></div>
  </div>

  <div *ngIf="error" class="p-4 bg-red-50 text-red-600 rounded-xl border border-red-200">
    {{ error }}
  </div>

  <div *ngIf="!loading && ticketData" class="space-y-6">
    <div class="bg-white rounded-2xl border overflow-hidden">
      <div class="px-6 py-4 border-b bg-gradient-to-r from-[#ECECFF] to-white">
        <h3 class="text-lg font-semibold text-[#0C144E]">Performance des techniciens</h3>
        <p class="text-xs text-gray-500">Détail des tickets résolus et taux de réussite</p>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full">
          <thead>
            <tr class="border-b bg-gray-50">
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Technicien</th>
              <th class="px-6 py-3 text-center text-xs font-medium text-gray-500">Assignés</th>
              <th class="px-6 py-3 text-center text-xs font-medium text-gray-500">En cours</th>
              <th class="px-6 py-3 text-center text-xs font-medium text-gray-500">Résolus</th>
              <th class="px-6 py-3 text-center text-xs font-medium text-gray-500">Taux succès</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Progression</th>
            </tr>
          </thead>
          <tbody class="divide-y">
            <tr *ngFor="let tech of ticketData.topTechniciens" class="hover:bg-gray-50 transition">
              <td class="px-6 py-3">
                <div class="flex items-center gap-3">
                  <span class="text-sm font-medium">{{ tech.prenom }} {{ tech.nom }}</span>
                </div>
              </td>
              <td class="px-6 py-3 text-center text-sm font-semibold text-gray-600">{{ tech.ticketsTotal}}</td>
              <td class="px-6 py-3 text-center text-sm text-orange-600">{{ tech.ticketsEnCours }}</td>
              <td class="px-6 py-3 text-center text-sm font-semibold text-green-600">{{ tech.ticketsResolus }}</td>
              <td class="px-6 py-3 text-center">
                <span class="px-2 py-1 text-xs rounded-full" [class.bg-green-100]="tech.tauxResolution >= 70" 
                      [class.bg-yellow-100]="tech.tauxResolution >= 50 && tech.tauxResolution < 70"
                      [class.bg-red-100]="tech.tauxResolution < 50">
                  {{ tech.tauxResolution }}%
                </span>
              </td>
              <td class="px-6 py-3">
                <div class="w-24 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-[#8788FF] to-[#C5C6FF] rounded-full" [style.width]="tech.tauxResolution + '%'"></div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    </div>

<div class="space-y-4">
  <!-- Carte principale -->
  <div class="rounded-2xl border border-gray-200 bg-white dark:border-white/[0.05] dark:bg-white/[0.03] shadow-sm overflow-hidden">
    
    <!-- En-tête avec titre -->
    <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-800">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90 flex items-center gap-2">
            Gestion des utilisateurs
            <span class="inline-flex items-center justify-center px-2 py-1 text-xs font-medium bg-brand-100 text-brand-700 dark:bg-brand-900/30 dark:text-brand-400 rounded-full">
              {{ users?.length || 0 }}
            </span>
          </h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
            Gérez les utilisateurs et leurs permissions
          </p>
        </div>
        
        <!-- Bouton Ajouter un utilisateur -->
        <app-button
          routerLink="/admin/create-user"
          variant="primary"
          size="md"
          className="flex items-center gap-2 rounded-xl"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Ajouter un utilisateur
        </app-button>
      </div>
    </div>

    <!-- Barre de recherche et filtres -->
    <div class="flex flex-col gap-4 px-6 py-4 sm:flex-row sm:items-center sm:justify-between border-b border-gray-200 dark:border-gray-800">
      
      <!-- Barre de recherche améliorée -->
      <div class="relative w-full sm:w-auto">
        <span class="absolute -translate-y-1/2 pointer-events-none left-4 top-1/2">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </span>
        <input
          #searchInput
          type="text"
          name="search"
          placeholder="Rechercher par nom, email, rôle..."
          [(ngModel)]="searchTerm"
          (input)="onSearch()"
          class="h-11 w-full sm:w-[350px] lg:w-[430px] rounded-xl border border-gray-200 bg-gray-50 py-2.5 pl-11 pr-4 text-sm text-gray-800 placeholder:text-gray-400 focus:border-brand-300 focus:outline-none focus:ring-2 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white/90 dark:placeholder:text-white/30 transition-all"
        />
      </div>

      <!-- Filtres et actions -->
      <div class="flex items-center gap-3 flex-wrap">
        <!-- Filtre par rôle -->
        <div class="relative">
          <select
            [(ngModel)]="selectedRole"
            (change)="applyFilter()"
            class="h-11 px-4 pr-8 text-sm rounded-xl border border-gray-300 bg-white focus:border-brand-300 focus:ring-1 focus:ring-brand-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 appearance-none transition-colors"
          >
            <option value="">Tous les rôles</option>
            <option *ngFor="let role of roleOptions" [value]="role">
              {{ role }}
            </option>
          </select>
          <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>

        <!-- Filtre par statut -->
        <div class="relative">
          <select
            [(ngModel)]="selectedStatut"
            (change)="applyFilter()"
            class="h-11 px-4 pr-8 text-sm rounded-xl border border-gray-300 bg-white focus:border-brand-300 focus:ring-1 focus:ring-brand-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 appearance-none transition-colors"
          >
            <option value="">Tous les statuts</option>
            <option value="Actif">Actif</option>
            <option value="Inactif">Inactif</option>
          </select>
          <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>

        <!-- Indicateur de filtres actifs -->
        <div *ngIf="selectedRole || selectedStatut" 
             class="flex items-center gap-2 px-3 py-1.5 bg-brand-50 dark:bg-brand-900/20 rounded-lg">
          <span class="text-xs text-brand-600 dark:text-brand-400">Filtres actifs</span>
          <button (click)="resetFilters()" class="text-brand-600 hover:text-brand-700 dark:text-brand-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <!-- Bouton Voir tout (caché si pas de filtres) -->
        <button
          *ngIf="selectedRole || selectedStatut"
          (click)="resetFilters()"
          class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          Réinitialiser
        </button>
      </div>
    </div>

    <!-- Loading indicator -->
    <div *ngIf="loading" class="flex justify-center items-center py-16">
      <div class="animate-spin rounded-full h-10 w-10 border-4 border-brand-200 border-t-brand-600"></div>
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="error" class="mx-6 my-4 p-4 bg-red-50 text-red-600 rounded-xl border border-red-200 dark:bg-red-900/20 dark:text-red-400 dark:border-red-800 flex items-center gap-3">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span class="text-sm">{{ error }}</span>
    </div>

    <!-- Tableau des utilisateurs -->
    <div *ngIf="!loading && !error" class="overflow-x-auto">
      <app-basic-table-one
        [tableData]="users"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="onPageChange($event)"
        (toggle)="toggleUser($event)"
      >
      </app-basic-table-one>

      <!-- Message si aucun utilisateur -->
      <div *ngIf="!users || users.length === 0" class="py-16 text-center">
        <div class="flex flex-col items-center justify-center">
          <svg class="w-16 h-16 text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
          <p class="text-gray-500 dark:text-gray-400 text-lg font-medium">Aucun utilisateur trouvé</p>
          <p class="text-gray-400 dark:text-gray-500 text-sm mt-1">Commencez par ajouter un nouvel utilisateur</p>
          <button
            routerLink="/admin/create-user"
            class="mt-4 inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white hover:bg-brand-600 transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Ajouter un utilisateur
          </button>
        </div>
      </div>
    </div>

    <!-- Pagination améliorée -->
    <div *ngIf="!loading && !error && users && users.length > 0" class="px-6 py-4 border-t border-gray-200 dark:border-gray-800">
      <div class="flex items-center justify-between">
        <!-- Previous Button -->
        <button
          (click)="onPageChange(currentPage - 1)"
          [disabled]="currentPage === 1 || totalPages === 0"
          class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
          <span class="hidden sm:inline">Précédent</span>
        </button>
        
        <!-- Page Info (Mobile) -->
        <span class="text-sm font-medium text-gray-700 dark:text-gray-400 sm:hidden">
          Page {{ currentPage }} / {{ totalPages || 1 }}
        </span>
        
        <!-- Page Numbers (Desktop) -->
        <ul class="hidden items-center gap-1 sm:flex">
          <ng-container *ngIf="totalPages > 0; else noPages">
            <li *ngFor="let page of getPageNumbers()">
              <ng-container *ngIf="page !== -1; else ellipsis">
                <button
                  (click)="onPageChange(page)"
                  class="flex h-9 w-9 items-center justify-center rounded-lg text-sm font-medium transition-colors"
                  [ngClass]="{
                    'bg-brand-500 text-white hover:bg-brand-600': currentPage === page,
                    'text-gray-700 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800': currentPage !== page
                  }"
                >
                  {{ page }}
                </button>
              </ng-container>
              <ng-template #ellipsis>
                <span class="flex h-9 w-9 items-center justify-center text-gray-500">...</span>
              </ng-template>
            </li>
          </ng-container>
          <ng-template #noPages>
            <li>
              <button class="flex h-9 w-9 items-center justify-center rounded-lg bg-brand-500 text-white">
                1
              </button>
            </li>
          </ng-template>
        </ul>
        
        <!-- Next Button -->
        <button
          (click)="onPageChange(currentPage + 1)"
          [disabled]="currentPage === totalPages || totalPages === 0"
          class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors"
        >
          <span class="hidden sm:inline">Suivant</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

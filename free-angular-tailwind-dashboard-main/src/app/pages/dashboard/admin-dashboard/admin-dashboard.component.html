<div class="space-y-6 p-4 md:p-6">
  
  <!-- En-tête avec les onglets ET le datepicker -->
  <div class="flex flex-wrap items-center justify-between gap-4 border-b">
    <div class="flex gap-2">
      <a 
        routerLink="tickets"
        routerLinkActive="border-[#8788FF] text-[#8788FF]"
        [routerLinkActiveOptions]="{exact: true}"
        class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 transition-all hover:text-gray-700">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          Tickets
        </div>
      </a>
      
      <a 
        routerLink="incidents"
        routerLinkActive="border-[#8788FF] text-[#8788FF]"
        class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 transition-all hover:text-gray-700">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
          Incidents
        </div>
      </a>
      
      <a 
        routerLink="technicien-performance"
        routerLinkActive="border-[#8788FF] text-[#8788FF]"
        class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 transition-all hover:text-gray-700">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Performance techniciens
        </div>
      </a>
    </div>
 
  </div>
 
  <!-- Router outlet pour les composants enfants -->
  <router-outlet></router-outlet>
</div>

<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fadeIn {
    animation: fadeIn 0.5s ease-out;
  }
  
  /* Styles pour flatpickr */
  .flatpickr-calendar {
    font-family: 'Poppins', system-ui, sans-serif !important;
    border-radius: 12px !important;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1) !important;
    border: 1px solid #e2e8f0 !important;
  }
  
  .flatpickr-day.selected {
    background: #8788FF !important;
    border-color: #8788FF !important;
  }
  
  .flatpickr-day.selected:hover {
    background: #6b6cff !important;
  }
  
  .flatpickr-day.inRange {
    background: #ECECFF !important;
    border-color: #ECECFF !important;
  }
</style>

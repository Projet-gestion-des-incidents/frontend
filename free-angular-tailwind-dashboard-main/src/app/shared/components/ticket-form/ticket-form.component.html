<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow p-6">

  <h2 class="text-2xl font-semibold mb-6">
    Nouveau Ticket 
  </h2>

  <form [formGroup]="ticketForm" (ngSubmit)="submit()" class="space-y-5">

    <!-- Titre -->
    <div>
      <label class="block mb-2 text-sm font-medium">Titre <span class="text-red-500">*</span></label>
      <input
        type="text"
        formControlName="titreTicket"
        class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500"
        placeholder="Ex: Problème accès application"
      />
      <small *ngIf="ticketForm.get('titreTicket')?.invalid && ticketForm.get('titreTicket')?.touched"
        class="text-red-500">
        Le titre est obligatoire (min. 3 caractères)
      </small>
    </div>

    <!-- Description -->
    <div>
      <label class="block mb-2 text-sm font-medium">Description <span class="text-red-500">*</span></label>
      <textarea
        rows="4"
        formControlName="descriptionTicket"
        class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500"
        placeholder="Décrivez le problème..."
      ></textarea>
      <small *ngIf="ticketForm.get('descriptionTicket')?.invalid && ticketForm.get('descriptionTicket')?.touched"
        class="text-red-500">
        La description est obligatoire
      </small>
    </div>

    <!-- Assignation à un technicien -->
    <div>
      <label class="block mb-2 text-sm font-medium">Assigner à (optionnel)</label>
      <select
        formControlName="assigneeId"
        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500"
      >
        <option [ngValue]="null">-- Non assigné --</option>
        <option *ngFor="let technicien of technicienOptions" [ngValue]="technicien.value">
          {{ technicien.label }}
        </option>
      </select>
      
      <!-- Message si aucun technicien trouvé -->
      <small *ngIf="technicienOptions.length === 0" class="text-amber-600">
        Aucun technicien disponible
      </small>
    </div>

    <!-- Date limite (optionnel) -->
    <div>
      <label class="block mb-2 text-sm font-medium">Date limite (optionnel)</label>
      <input
        type="datetime-local"
        formControlName="dateLimite"
        class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500"
      />
    </div>
    <!-- ⬇️ NOUVEAU : Sélection multiple d'incidents -->
    <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
      <label class="block mb-2 text-sm font-medium">
        Incidents liés (optionnel)
        <span class="text-xs text-gray-500 ml-2">Vous pouvez sélectionner plusieurs incidents</span>
      </label>
      
      <app-multi-select
        [options]="incidentOptions"
        [defaultSelected]="selectedIncidentIds"
        (selectionChange)="onIncidentSelectionChange($event)"
        placeholder="Sélectionnez des incidents..."
      ></app-multi-select>
      
      <!-- Message si aucun incident disponible -->
      <small *ngIf="incidentOptions.length === 0" class="text-amber-600 block mt-2">
        Aucun incident disponible
      </small>
      
      <!-- Indicateur de chargement -->
      <small *ngIf="incidentOptions.length === 0" class="text-gray-500 block mt-1">
        Chargement des incidents...
      </small>
    </div>
    <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
      <!-- Commentaire initial -->
      <div>
        <label class="block mb-2 text-sm font-medium">Commentaire initial</label>
        <textarea formControlName="commentaireInitial" rows="3"
                  class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500"
                  placeholder="Ajouter un commentaire initial..."></textarea>
      </div>

      <!-- Commentaire interne -->
      <div class="flex items-center gap-2 mt-3">
        <app-checkbox
          [checked]="ticketForm.get('commentaireInterne')?.value"
          (checkedChange)="ticketForm.get('commentaireInterne')?.setValue($event)"
          id="interne"
        ></app-checkbox>
        <label for="interne" class="text-sm font-medium">Commentaire interne</label>
      </div>
      
      <!-- Pièces jointes -->
      <div class="mt-4">
        <label class="block mb-2 text-sm font-medium">Pièces jointes</label>
        <app-file-input-example (change)="onFileSelected($event)"></app-file-input-example>
      </div>
    </div>

    <!-- Boutons -->
    <div class="flex justify-end gap-3 pt-4">
      <button
        type="button"
        routerLink="/tickets"
        class="px-4 py-2 border rounded-lg hover:bg-gray-50"
      >
        Annuler
      </button>

      <button
        type="submit"
        [disabled]="loading || ticketForm.invalid"
        class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Enregistrement...' : 'Créer Ticket' }}
      </button>
    </div>

  </form>
</div>

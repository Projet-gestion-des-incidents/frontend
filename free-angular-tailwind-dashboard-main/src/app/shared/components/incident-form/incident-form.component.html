<div class="max-w-4xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-semibold text-gray-800 dark:text-white/90">
      Nouvel incident
    </h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
      Créez un nouvel incident en remplissant le formulaire ci-dessous
    </p>
  </div>

  <form (ngSubmit)="onSubmit()" #incidentForm="ngForm" class="space-y-6">
    <!-- Message d'erreur -->
    <div *ngIf="error" class="p-4 bg-error-50 text-error-600 rounded-lg">
      {{ error }}
    </div>

    <!-- Informations générales -->
    <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
      <h3 class="mb-4 text-lg font-semibold text-gray-800 dark:text-white/90">
        Informations incident
      </h3>

      <div class="space-y-4">
       

        <!-- Description -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-400 mb-2">
            Description detaillée<span class="text-error-500">*</span>
          </label>
          <textarea
            [(ngModel)]="incident.descriptionIncident"
            name="description"
            required
            rows="4"
            class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-theme-sm text-gray-700 shadow-theme-xs focus:border-brand-300 focus:outline-none dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400"
        placeholder="Décrivez le problème rencontré..."
          ></textarea>
        </div>
           <!-- emplacement -->
    <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-400 mb-2">
        Emplacement <span class="text-error-500">*</span>
      </label>
<!-- Carte Leaflet -->
<div class="mb-4">
<app-map (locationSelected)="onLocationSelected($event)"></app-map></div>
  
    </div>
   <!-- Type de problème -->
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-400 mb-2">
       Quel type de problème rencontrez-vous ? <span class="text-error-500">*</span>
      </label>
      <select
           [(ngModel)]="incident.typeProbleme"
        name="typeProbleme"
        required
        class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-theme-sm text-gray-700 shadow-theme-xs focus:border-brand-300 focus:outline-none dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400"
      >
        <option [ngValue]="undefined" disabled selected>-- Sélectionnez un type --</option>

       <option [ngValue]="1">Paiement refusé</option>
        <option [ngValue]="2">Terminal hors ligne</option>
        <option [ngValue]="3">Lenteur</option>
        <option [ngValue]="4">Bug affichage</option>
        <option [ngValue]="5">Connexion réseau</option>
        <option [ngValue]="6">Erreur flux transactionnel</option>
        <option [ngValue]="7">Problème logiciel TPE</option>
        <option [ngValue]="8">Autre</option>
      </select>
    </div>

  <!-- Sélection du terminal TPE -->
<!--  <div>
  <label class="block text-sm font-medium text-gray-700 dark:text-gray-400 mb-2">
    Terminal TPE <span class="text-error-500">*</span>
  </label>
  
  <select
    [(ngModel)]="incident.TPEIds"
    name="TPEIds"
    required
    class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-theme-sm text-gray-700 shadow-theme-xs focus:border-brand-300 focus:outline-none dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400"
  >
  <option [ngValue]="undefined" disabled selected>-- Sélectionnez un ou plusieurs TPE --</option>
    <option *ngFor="let tpe of tpes" [value]="tpe.id">
      {{ tpe.numSerieComplet }} - {{ tpe.modele }}
    </option>
  </select>
</div>-->
    <!-- Sélection du terminal TPE avec app-multi-select -->
<div>
  <label class="block text-sm font-medium text-gray-700 dark:text-gray-400 mb-2">
    Terminal TPE <span class="text-error-500">*</span>
  </label>

  <app-multi-select
    [options]="tpeOptions"
    [defaultSelected]="incident.TPEIds"
    (selectionChange)="onTpeSelectionChange($event)"
  ></app-multi-select>
</div>
        
      </div> 
    </div>

   

    <!-- Boutons d'action -->
    <div class="flex justify-end gap-3">
      <button
        type="button"
        (click)="cancel()"
        class="px-6 py-2.5 text-theme-sm font-medium text-gray-700 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200"
      >
        Annuler
      </button>
      <button
        type="submit"
        [disabled]="loading || !incidentForm.form.valid"
        class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-6 py-2.5 text-theme-sm font-medium text-white shadow-theme-xs hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span *ngIf="loading" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
        {{ loading ? 'Création...' : 'Créer l\'incident' }}
      </button>
    </div>
  </form>
</div>

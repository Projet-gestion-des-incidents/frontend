<!-- notification-dropdown.component.html -->
<div class="relative">
  <!-- Bouton d'ouverture -->
  <button
    class="relative flex items-center justify-center text-gray-500 transition-colors bg-white border border-gray-200 rounded-full dropdown-toggle hover:text-gray-700 h-11 w-11 hover:bg-gray-100 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white"
    (click)="toggleDropdown()"
  >
    <!-- Badge de compteur -->
    <span
      *ngIf="unreadCount > 0"
      class="absolute -top-1 -right-1 z-10 flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white"
    >
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
    
    <!-- Icône cloche -->
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>
  </button>

  <!-- Dropdown -->
  <app-dropdown
    [isOpen]="isOpen"
    (close)="closeDropdown()"
    className="absolute -right-[240px] mt-[17px] flex h-[480px] w-[350px] flex-col rounded-2xl border border-gray-200 bg-white p-3 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark sm:w-[361px] lg:right-0"
  >
    <!-- Header -->
    <div class="flex items-center justify-between pb-3 mb-3 border-b border-gray-100 dark:border-gray-700">
      <h5 class="text-lg font-semibold text-gray-800 dark:text-gray-200">
        Notifications
        <span *ngIf="unreadCount > 0" class="ml-2 text-xs text-red-500">({{ unreadCount }} non lue{{ unreadCount > 1 ? 's' : '' }})</span>
      </h5>
      <div class="flex gap-2">
        <button
          *ngIf="unreadCount > 0"
          (click)="markAllAsRead()"
          class="text-xs text-green-500 hover:text-green-700"
          title="Tout marquer comme lu"
        >
           Tout lu
        </button>
        <button
          *ngIf="notifications.length > 0"
          (click)="deleteAllNotifications()"
          class="text-xs text-red-500 hover:text-red-700"
          title="Supprimer toutes"
        >
           Tout supprimer
        </button>
        <button
          (click)="toggleDropdown()"
          class="text-gray-500 hover:text-gray-700"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="flex justify-center py-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
    </div>

    <!-- Liste des notifications -->
    <ul *ngIf="!isLoading" class="flex flex-col flex-1 overflow-y-auto custom-scrollbar">
      <ng-container *ngIf="notifications.length > 0; else noNotifications">
        <li *ngFor="let notification of notifications">
          <div
            (click)="onNotificationClick(notification)"
            class="cursor-pointer w-full text-left transition-all duration-200 rounded-lg border-b border-gray-100 p-3 hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-gray-700/50"
            [class.bg-blue-50]="!notification.estLu"
            [class.dark:bg-blue-900/20]="!notification.estLu"
          >
            <div class="flex gap-3">
              <!-- Icône SVG avec ngSwitch basé sur le nom du type -->
              <div class="flex-shrink-0" [ngSwitch]="notification.typeNotificationName">
                
                <!-- Ticket créé -->
    <svg *ngSwitchCase="'TicketCree'" class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"/>
    </svg>

    <!-- Ticket assigné -->
    <svg *ngSwitchCase="'TicketAssigne'" class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
    </svg>

    <!-- Ticket modifié -->
    <svg *ngSwitchCase="'TicketModifie'" class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
    </svg>

    <!-- Ticket clôturé / résolu -->
    <svg *ngSwitchCase="'TicketCloture'" class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>

    <!-- Incident créé -->
    <svg *ngSwitchCase="'IncidentCree'" class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>

    <!-- Incident résolu -->
    <svg *ngSwitchCase="'IncidentResolu'" class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>

    <!-- Commentaire ajouté -->
    <svg *ngSwitchCase="'CommentaireAjoute'" class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
    </svg>

    <!-- Rappel -->
    <svg *ngSwitchCase="'Rappel'" class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>

    <!-- Incident modifié -->
    <svg *ngSwitchCase="'IncidentModifie'" class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
    </svg>

    <!-- TPE ajouté -->
    <svg *ngSwitchCase="'TPECree'" class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
    </svg>

    <!-- ⚠️ Pour "Ticket en cours" - détection par le titre car pas de type dédié -->
    <ng-container *ngSwitchDefault>
      <svg *ngIf="notification.titre?.includes('En cours')" class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      
      <!-- Icône par défaut -->
      <svg *ngIf="!notification.titre?.includes('En cours')" class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
    </ng-container>

  </div>

              <!-- Contenu -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-2">
                  <p class="text-sm font-semibold text-gray-800 dark:text-white line-clamp-2">
                    {{ notification.titre }}
                  </p>
                  <span class="text-xs text-gray-400 whitespace-nowrap">
                    {{ formatDate(notification.dateEnvoi) }}
                  </span>
                </div>
                
                <p class="mt-1 text-xs text-gray-600 dark:text-gray-400 line-clamp-2">
                  {{ notification.message }}
                </p>
                
                <div class="flex items-center justify-between mt-2">
                  <span class="text-xs text-gray-400">
                    {{ getTypeLabel(notification.typeNotificationName) }}
                  </span>
                  
                  <div class="flex gap-1">
                    <button
                      *ngIf="!notification.estLu"
                      (click)="markAsRead(notification.id, $event)"
                      class="text-xs text-blue-500 hover:text-blue-700 px-2 py-0.5 rounded hover:bg-blue-50"
                      title="Marquer comme lu"
                    >
                       Marquer lu
                    </button>
                    <button
                      (click)="deleteNotification(notification.id, $event)"
                      class="text-xs text-red-500 hover:text-red-700 px-2 py-0.5 rounded hover:bg-red-50"
                      title="Supprimer"
                    >
                       Supprimer
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </li>
      </ng-container>

      <ng-template #noNotifications>
        <li class="py-8 text-center text-gray-500 dark:text-gray-400">
          <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <p>Aucune notification</p>
        </li>
      </ng-template>
    </ul>

    <!-- Bouton Voir plus -->
    <div *ngIf="allNotifications && !showAll && allNotifications.length > displayLimit" class="mt-2 pt-2 border-t border-gray-100 dark:border-gray-700">
      <button
        (click)="loadMore()"
        class="w-full py-2 text-sm text-blue-500 hover:text-blue-700 transition-colors"
      >
        Voir plus ({{ allNotifications.length - displayLimit }})
      </button>
    </div>

  </app-dropdown>
</div>
